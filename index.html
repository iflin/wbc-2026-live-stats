<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>WBC 2026 賽事即時數據報表</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f7f9fc; }
        iframe { border: none; width: 100%; height: 100%; }
        #update-toast {
            position: fixed; top: 10px; right: 20px;
            background: #28a745; color: white;
            padding: 8px 16px; border-radius: 4px;
            font-family: sans-serif; font-size: 14px;
            opacity: 0; transition: opacity 0.5s; pointer-events: none; z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="update-toast">資料已即時更新</div>
    <!-- 實際放入我們產出的 HTML -->
    <iframe id="report-frame" src="788117_ChineseTaipei_vs_Czechia_LiveStats.html"></iframe>

    <script>
        const frame = document.getElementById('report-frame');
        const toast = document.getElementById('update-toast');
        const RELOAD_SEC = 30; // 每 30 秒靜默刷新一次
        let baseSrc = frame.src.split('?')[0];

        function silentRefresh() {
            // 在不觸發整個外殼頁面重整的情況下，變更 iframe 的 URL 參數強制取回最新檔案
            // 注意：因為只有 iframe 內部重新載入，主外殼不會閃爍，體驗較佳。
            // 為了不讓使用者失去目前所在的視角（例如表格看一半），我們需要先盡可能記錄 iframe 內部的滾動位置
            try {
                const innerWindow = frame.contentWindow;
                const innerDoc = frame.contentDocument || innerWindow.document;
                
                // 若同源策略允許，記錄滾動
                const scrollX = innerWindow.scrollX || innerDoc.documentElement.scrollLeft;
                const scrollY = innerWindow.scrollY || innerDoc.documentElement.scrollTop;

                // 準備在 iframe 讀取完成後恢復滾動條
                frame.onload = function() {
                    try {
                        frame.contentWindow.scrollTo(scrollX, scrollY);
                        // 顯示小提示框
                        toast.style.opacity = 1;
                        setTimeout(() => toast.style.opacity = 0, 2500);
                    } catch(e) {}
                    
                    // 解除一次性綁定，避免後續重複觸發
                    frame.onload = null;
                };

            } catch(e) { /* DOMException on Cross-origin or early load */ }

            frame.src = baseSrc + '?t=' + new Date().getTime();
        }

        setInterval(silentRefresh, RELOAD_SEC * 1000);
    </script>
</body>
</html>
