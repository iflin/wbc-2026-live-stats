<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>WBC 2026 賽事即時數據報表</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f7f9fc; }
        .frame-container { position: relative; width: 100%; height: 100%; }
        iframe { position: absolute; top: 0; left: 0; border: none; width: 100%; height: 100%; transition: opacity 0.2s ease-in-out; }
        .hidden { opacity: 0; pointer-events: none; z-index: 1; }
        .visible { opacity: 1; pointer-events: auto; z-index: 2; }
        #update-toast {
            position: fixed; top: 10px; right: 20px;
            background: #28a745; color: white;
            padding: 8px 16px; border-radius: 4px;
            font-family: sans-serif; font-size: 14px;
            opacity: 0; transition: opacity 0.5s; pointer-events: none; z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="update-toast">資料已即時更新</div>
    <div class="frame-container">
        <!-- 採用雙層 iframe 輪替，以消除載入閃爍 -->
        <iframe id="frame1" class="visible" src="788117_ChineseTaipei_vs_Czechia_LiveStats.html"></iframe>
        <iframe id="frame2" class="hidden" src=""></iframe>
    </div>

    <script>
        let activeFrame = document.getElementById('frame1');
        let inactiveFrame = document.getElementById('frame2');
        const toast = document.getElementById('update-toast');
        const RELOAD_SEC = 10; // 每 10 秒靜默刷新一次
        let baseSrc = activeFrame.src.split('?')[0];

        function doubleBufferRefresh() {
            try {
                // 取得目前正在觀看視窗的狀態
                const innerWindow = activeFrame.contentWindow;
                const innerDoc = activeFrame.contentDocument || innerWindow.document;
                
                // 定義 onload，當背景 iframe 載入完畢後執行切換
                inactiveFrame.onload = function() {
                    try {
                        // 取得「交換前一刻」當下最精準的捲動高度
                        const currentInnerWindow = activeFrame.contentWindow;
                        const currentInnerDoc = activeFrame.contentDocument || currentInnerWindow.document;
                        const finalScrollX = currentInnerWindow.scrollX || currentInnerDoc.documentElement.scrollLeft || currentInnerDoc.body.scrollLeft || 0;
                        const finalScrollY = currentInnerWindow.scrollY || currentInnerDoc.documentElement.scrollTop || currentInnerDoc.body.scrollTop || 0;

                        // 將準備登場的隱藏 iframe 捲動到相同高度
                        inactiveFrame.contentWindow.scrollTo(finalScrollX, finalScrollY);
                        
                        // 交換顯示狀態 (CSS transition 提供平滑過渡)
                        inactiveFrame.className = 'visible';
                        activeFrame.className = 'hidden';
                        
                        // 交換變數指標
                        const temp = activeFrame;
                        activeFrame = inactiveFrame;
                        inactiveFrame = temp;

                        // 顯示小提示框
                        toast.style.opacity = 1;
                        setTimeout(() => toast.style.opacity = 0, 2500);
                    } catch(e) {}
                    
                    // 解除一次性綁定
                    inactiveFrame.onload = null;
                };

            } catch(e) { /* 例外處理：若跨域或尚未就緒 */ }

            // 指定隱藏的 iframe 去抓取最新生成的靜態網頁
            inactiveFrame.src = baseSrc + '?t=' + new Date().getTime();
        }

        setInterval(doubleBufferRefresh, RELOAD_SEC * 1000);
    </script>
</body>
</html>
